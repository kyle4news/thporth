name: THPORTH Recaps + Official Highlights (2-stage)

on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYYMMDD (leave blank to use yesterday UTC)"
        required: false
        default: ""
      mode:
        description: "openai or inputs"
        required: true
        default: "openai"
  schedule:
    - cron: "10 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install -r requirements.txt

      - name: Compute date (YYYYMMDD)
        id: d
        run: |
          if [ "${{ github.event.inputs.date }}" != "" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date -u -d 'yesterday' +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Build all leagues
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "" ]; then MODE="openai"; fi
          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
          OPENAI_EXTRACTOR_MODEL="gpt-5-mini" \
          OPENAI_WRITER_MODEL="gpt-5-mini" \
          YOUTUBE_API_KEY="${{ secrets.YOUTUBE_API_KEY }}" \
          python scripts/build_recaps.py --league all --date "${{ steps.d.outputs.date }}" --mode "$MODE"

      - name: Commit and push
        run: |
          git config user.name "thporth-bot"
          git config user.email "actions@users.noreply.github.com"
          git add recaps briefings .cache || true
          git commit -m "Daily recaps + highlights" || echo "No changes"
          git push
