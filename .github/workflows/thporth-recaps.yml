name: THPORTH Recaps

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"   # 12:30 UTC daily (adjust anytime)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute "yesterday" date (UTC)
        id: d
        run: |
          echo "yyyymmdd=$(date -u -d 'yesterday' +%Y%m%d)" >> $GITHUB_OUTPUT

      # ---- FREE MODE (no OpenAI) ----
      # Produces recapInput fields you can paste into ChatGPT.
      - name: Build NBA (inputs)
        run: |
          python scripts/build_recaps.py --league nba --date "${{ steps.d.outputs.yyyymmdd }}" --mode inputs

      - name: Build NHL (inputs)
        run: |
          python scripts/build_recaps.py --league nhl --date "${{ steps.d.outputs.yyyymmdd }}" --mode inputs

      # ---- AUTOMATED MODE (OpenAI) ----
      # Uncomment when you add OPENAI_API_KEY in repo settings > Secrets.
      # - name: Build NBA (openai)
      #   env:
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #     OPENAI_MODEL: gpt-4o-mini
      #   run: |
      #     python scripts/build_recaps.py --league nba --date "${{ steps.d.outputs.yyyymmdd }}" --mode openai
      #
      # - name: Build NHL (openai)
      #   env:
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #     OPENAI_MODEL: gpt-4o-mini
      #   run: |
      #     python scripts/build_recaps.py --league nhl --date "${{ steps.d.outputs.yyyymmdd }}" --mode openai

      - name: Build briefings/latest.json from league latest.json files
        run: |
          python - << 'PY'
          import json, os, datetime

          def read(path):
            with open(path, "r", encoding="utf-8") as f:
              return json.load(f)

          out = {
            "generatedAt": datetime.datetime.now().isoformat(),
            "leagues": []
          }

          for league in ["nba", "nhl"]:
            p = f"recaps/{league}/latest.json"
            if not os.path.exists(p):
              continue
            data = read(p)
            out["leagues"].append({
              "league": league,
              "date": data.get("date"),
              "briefing": data.get("leagueBriefing"),
              "link": f"/recaps/{league}/latest.json"
            })

          os.makedirs("briefings", exist_ok=True)
          with open("briefings/latest.json", "w", encoding="utf-8") as f:
            json.dump(out, f, ensure_ascii=False, indent=2)

          # keep a tiny index of recent briefing dates if you want later
          PY

      - name: Commit generated JSON
        run: |
          git config user.name "thporth-bot"
          git config user.email "thporth-bot@users.noreply.github.com"
          git add recaps briefings || true
          git commit -m "Daily recaps: ${{ steps.d.outputs.yyyymmdd }}" || echo "Nothing to commit"
          git push
