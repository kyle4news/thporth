name: THPORTH Recaps + Official Highlights

on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYYMMDD (leave blank to use yesterday in UTC)"
        required: false
        default: ""
      mode:
        description: "inputs or openai"
        required: true
        default: "openai"
  schedule:
    # daily 06:10 UTC (adjust whenever)
    - cron: "10 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Compute date (YYYYMMDD)
        id: d
        run: |
          if [ "${{ github.event.inputs.date }}" != "" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            # default: yesterday UTC
            python - << 'PY'
from datetime import datetime, timedelta, timezone
d = (datetime.now(timezone.utc) - timedelta(days=1)).strftime("%Y%m%d")
print(f"date={d}")
PY
            python - << 'PY' > /tmp/date.txt
from datetime import datetime, timedelta, timezone
print((datetime.now(timezone.utc) - timedelta(days=1)).strftime("%Y%m%d"))
PY
            echo "date=$(cat /tmp/date.txt)" >> $GITHUB_OUTPUT
          fi

      - name: Build all leagues
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "" ]; then MODE="openai"; fi
          python scripts/build_recaps.py --league all --date "${{ steps.d.outputs.date }}" --mode "$MODE" --prompt scripts/thporth_prompt.txt

      - name: Commit and push
        run: |
          git config user.name "thporth-bot"
          git config user.email "actions@users.noreply.github.com"
          git add recaps briefings .cache || true
          git commit -m "Update recaps/briefings" || echo "No changes"
          git push
